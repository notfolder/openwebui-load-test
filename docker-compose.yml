version: "3.8"

services:

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    # container_name: openwebui
    # ports:
    #   - "3000:8080"  # Uvicornデフォルトポート
    environment:
      - OLLAMA_BASE_URL=                                        # LiteLLM 経由に切り替えたため無効化
      - OPENAI_API_BASE_URL=http://litellm:4000                # LiteLLM OpenAI 互換エンドポイント
      - OPENAI_API_KEY=sk-1234                                  # litellm_config.yaml の master_key に合わせる
      - ENABLE_OPENAI_API_COMPAT=true
      - DATABASE_URL=postgresql://openwebui:openwebui@db:5432/openwebui
      - RAG_EMBEDDING_MODEL=
    networks:
      - monitor-net
    depends_on:
      - litellm
      - db
    # ロードバランシングのために複数起動する設定
    deploy:
      mode: replicated
      replicas: 3 # ここで Open WebUI のインスタンス数を指定 (例: 3つ)

  db:
    image: postgres:15
    container_name: openwebui-db
    environment:
      POSTGRES_USER: openwebui
      POSTGRES_PASSWORD: openwebui
      POSTGRES_DB: openwebui
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - monitor-net

  ollama-mock:
    container_name: ollama-mock
    # コンテナのビルド設定
    build:
      # Dockerfileがあるディレクトリ（カレントディレクトリ）を指定します
      context: .
      # 使用するDockerfileの名前を指定します（デフォルトで'Dockerfile'が使われます）
      dockerfile: Dockerfile

    # ポートのマッピング設定（"ホスト側のポート:コンテナ側のポート"）
    ports:
      - "11434:11434"

    # 環境変数を設定します
    # ここで設定した値がDockerfile内のENVの値を上書きします
    environment:
      - GUNICORN_WORKERS=21
    networks:
      - monitor-net

  litellm-redis:
    image: redis:7-alpine
    container_name: litellm-redis
    networks:
      - monitor-net

  litellm-db:
    image: postgres:15
    container_name: litellm-db
    environment:
      POSTGRES_USER: litellm
      POSTGRES_PASSWORD: litellm
      POSTGRES_DB: litellm
    volumes:
      - litellm-postgres-data:/var/lib/postgresql/data
    networks:
      - monitor-net

  litellm:
    # database 対応イメージ (Prisma 込み) を使用: Virtual Keys・利用量トラッキング有効
    image: ghcr.io/berriai/litellm-database:main-v1.72.6-stable
    # container_name は外す (replicas > 1 のため)
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    environment:
      # LiteLLM DB (Virtual Keys・利用量トラッキング)
      - DATABASE_URL=postgresql://litellm:litellm@litellm-db:5432/litellm
      - LITELLM_MASTER_KEY=sk-1234                              # general_settings.master_key と揃える
      # Langfuse プロジェクトキー (Langfuse UI でプロジェクト作成後に取得して差し替える)
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY:-pk-lf-CHANGEME}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY:-sk-lf-CHANGEME}
      - LANGFUSE_HOST=http://langfuse:3000
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "8"]
    depends_on:
      - ollama-mock
      - litellm-db
      - litellm-redis
    networks:
      - monitor-net
    # LiteLLM を複数インスタンスで多重化
    deploy:
      mode: replicated
      replicas: 3

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - openwebui
    networks:
      - monitor-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    privileged: true
    container_name: cadvisor
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      # - /var/run/docker.sock:/var/run/docker.sock    # ← 追加：Docker API へのアクセス権を付与
    networks:
      - monitor-net

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: nginx-exporter
    command:
      - "-nginx.scrape-uri=http://nginx/nginx_status"
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - monitor-net

  pushgateway:
    image: prom/pushgateway:latest
    container_name: pushgateway
    ports:
      - "9091:9091"
    networks:
      - monitor-net

  openwebui-probe:
    build:
      context: .
      dockerfile: Dockerfile.probe
    container_name: openwebui-probe
    environment:
      - OPENWEBUI_URL=http://nginx
      - OPENWEBUI_MODEL=dummy:latest
      - OPENWEBUI_API_KEY=          # OpenWebUI の API キーを設定
      - PUSHGATEWAY_URL=http://pushgateway:9091
      - PROBE_INTERVAL=60           # 計測間隔(秒)
      - PROBE_QUESTION=Hello
    depends_on:
      - nginx
      - pushgateway
    networks:
      - monitor-net

  langfuse-db:
    image: postgres:15
    container_name: langfuse-db
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-postgres-data:/var/lib/postgresql/data
    networks:
      - monitor-net

  langfuse-redis:
    image: redis:7-alpine
    container_name: langfuse-redis
    networks:
      - monitor-net

  langfuse:
    image: langfuse/langfuse:2.84.0
    container_name: langfuse
    ports:
      - "3002:3000"
    environment:
      - DATABASE_URL=postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=changeme-secret-32-chars-minimum-xxx   # 本番では必ず変更
      - NEXTAUTH_URL=http://localhost:3002
      - SALT=changeme-salt-change-in-production                # 本番では必ず変更
      - REDIS_HOST=langfuse-redis
      - REDIS_PORT=6379
      - TELEMETRY_ENABLED=false
    depends_on:
      - langfuse-db
      - langfuse-redis
    networks:
      - monitor-net

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - monitor-net

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana  # ← 永続化ボリュームを追加
    networks:
      - monitor-net

networks:
  monitor-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  litellm-postgres-data:   # ← LiteLLM 用 PostgreSQL
    driver: local
  langfuse-postgres-data:  # ← Langfuse 用 PostgreSQL
    driver: local
  grafana-data:            # ← Grafana用の永続ボリュームを定義
    driver: local
  prometheus-data:         # ← Prometheus用の永続ボリュームを定義
    driver: local
