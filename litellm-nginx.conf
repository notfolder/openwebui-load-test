worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
  # Docker 内蔵 DNS リゾルバ
  resolver 127.0.0.11 valid=10s ipv6=off;

  # least_conn などをワーカープロセス間で共有するための shared memory zone
  upstream litellm_backend {
    least_conn;
    zone litellm_backend 64k;
    server litellm:4000;  # Docker DNS が replicas 3 台分の IP を返す
  }

  server {
    listen 4001;

    location / {
      proxy_pass http://litellm_backend;

      proxy_http_version 1.1;
      proxy_set_header Host              $http_host;  # $host はポート番号を落とすため $http_host を使用
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # SSE / streaming レスポンス用
      proxy_buffering off;
      proxy_cache off;
      proxy_set_header Accept-Encoding "";
      proxy_set_header Connection "";

      proxy_read_timeout    300s;
      proxy_connect_timeout  60s;
      proxy_send_timeout    300s;
    }
  }
}
